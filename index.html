<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Forge Repository</title>

<style>
:root {
    --rosewater:#f5e0dc;
    --flamingo:#f2cdcd;
    --pink:#f5c2e7;
    --mauve:#cba6f7;
    --red:#f38ba8;
    --maroon:#eba0ac;
    --peach:#fab387;
    --yellow:#f9e2af;
    --green:#a6e3a1;
    --teal:#94e2d5;
    --sky:#89dceb;
    --sapphire:#74c7ec;
    --blue:#89b4fa;
    --lavender:#b4befe;

    --text:#cdd6f4;
    --subtext1:#bac2de;
    --subtext0:#a6adc8;
    --overlay2:#9399b2;
    --overlay1:#7f849c;
    --overlay0:#6c7086;
    --surface2:#585b70;
    --surface1:#45475a;
    --surface0:#313244;
    --base:#1e1e2e;
    --mantle:#181825;
    --crust:#11111b;
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:var(--base);
    color:var(--text);
    font-family:Inter,Segoe UI,Helvetica,sans-serif;
    min-height:100vh;

    display:flex;
    justify-content:center;
    align-items:center;

    padding:40px;
}

.container{
    width:min(850px,100%);
}

.logo{
    font-size:4rem;
    text-align:center;
    margin-bottom:.3rem;
}

h1{
    text-align:center;
    font-size:3rem;
    color:var(--mauve);
}

.subtitle{
    text-align:center;
    color:var(--subtext0);
    margin-bottom:2rem;
}

.card{
    background:var(--mantle);
    border:1px solid var(--surface1);
    border-radius:16px;
    overflow:hidden;
    box-shadow:0 20px 60px rgba(0,0,0,.45);
}

.header{
    background:var(--surface0);
    padding:.9rem 1.2rem;
    display:flex;
    gap:8px;
    align-items:center;
}

.dot{
    width:12px;
    height:12px;
    border-radius:50%;
}

.red{background:var(--red);}
.yellow{background:var(--yellow);}
.green{background:var(--green);}

pre{
    padding:1.4rem;
    overflow:auto;
    font-size:.95rem;
    line-height:1.6;
    font-family:JetBrains Mono,monospace;
    color:var(--green);
}

footer{
    text-align:center;
    margin-top:2rem;
    color:var(--overlay1);
}

a{
    color:var(--blue);
    text-decoration:none;
}

a:hover{
    color:var(--sky);
}
</style>

</head>
<body>

<div class="container">

<div class="logo">🔥</div>

<h1>Forge</h1>

<p class="subtitle">
Personal Arch Linux Package Repository
</p>

<div class="card">

<div class="header">
<div class="dot red"></div>
<div class="dot yellow"></div>
<div class="dot green"></div>
</div>

<pre>
# Add Forge Repository

[forge]
SigLevel = Optional TrustAll
Server = https://roxxadiiii.github.io/forge/repo/$arch

# Refresh

sudo pacman -Syy

# Install

sudo pacman -S forge-hello
</pre>

</div>

<footer>

Built with ❤️ on Arch Linux

<br><br>

<a href="https://github.com/roxxadiiii/forge">
View on GitHub
</a>

</footer>

</div>

</body>
</html>
